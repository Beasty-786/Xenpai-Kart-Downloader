name: Build Xenpai Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python and dependencies
        run: |
          uv python install 3.11
          uv sync --locked

      - name: Run tests
        run: uv run python -m pytest -q

      - name: Build portable application
        run: uv run python scripts/deploy.py

      - name: Build English installer
        run: |
          choco install innosetup --yes --no-progress
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "scripts\Xenpai-Kart-Downloader.iss"

      - name: Read version
        shell: pwsh
        run: |
          $version = uv run python -c "from app.config.constants import VERSION; print(VERSION)"
          "XENPAI_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xenpai-Kart-Downloader-v${{ env.XENPAI_VERSION }}-Windows-Setup
          path: dist/Xenpai-Kart-Downloader-v${{ env.XENPAI_VERSION }}-Windows-Setup.exe

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $installer = "dist/Xenpai-Kart-Downloader-v${env:XENPAI_VERSION}-Windows-Setup.exe"
          gh release create "${{ github.ref_name }}" $installer `
            --title "Xenpai Kart Downloader v${env:XENPAI_VERSION}" `
            --generate-notes
